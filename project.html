<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="page-title">Project Details</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="LoadProjects.js"></script>
</head>
<body>
<nav>
    <div class="nav-left">
        <h2 class="nav-element"><a href="index.html">Home</a></h2>
    </div>
    <div class="nav-right">
        <h2 class="nav-element"><a href="https://github.com/jackoberto">GitHub</a></h2>
        <h2 class="nav-element"><a href="https://www.linkedin.com/in/jackkarlsson/">LinkedIn</a></h2>
    </div>
</nav>
<header class="content">
    <h1 id="project-title">Project Name</h1>
    <p id="project-date" class="project-date">Date</p>
    <h2 style="margin-bottom: 0">Description</h2>
</header>
<main class="content">
    <section>
        <p id="project-description" class="project-description description--long"></p>
        <p id="project-description-short" class="description--short"></p>
    </section>
    <section id="project-screenshots" class="screenshots">
    </section>
    <section id="project-role-section">
        <h2>Role</h2>
        <p id="project-role"></p>
        <div id="project-contributions-container">
            <h2>Contributions</h2>
            <ul id="project-contributions"></ul>
        </div>
    </section>
    <section id="project-technologies-section">
        <h2>Technologies</h2>
        <ul id="project-technologies"></ul>
    </section>
    <section id="project-links-section" class="project-links">
        <h2>Links</h2>
        <div id="project-links-grid" class="project-link-grid">
        </div>
    </section>
</main>
</body>
</html>
